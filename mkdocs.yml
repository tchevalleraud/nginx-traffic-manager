site_name: Nginx Traffic Manager
site_url: https://tchevalleraud.github.io/nginx-traffic-manager/
site_description: An open-source alternative to F5 BIG-IP, built on Nginx and delivered as a single Docker image.
repo_url: https://github.com/tchevalleraud/nginx-traffic-manager
repo_name: tchevalleraud/nginx-traffic-manager

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fr
          name: Français
          build: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
  - User Guide:
      - Virtual Servers: guide/virtual-servers.md
      - Pools & Members: guide/pools.md
      - Load Balancing: guide/load-balancing.md
      - SSL/TLS: guide/ssl.md
      - Network Interfaces: guide/network-interfaces.md
  - API Reference: api/index.md
  - Contributing: contributing.md
